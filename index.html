// ── Chart Components ───────────────────────────────────────────────
function DonutChart({ segments }) {
  const cx=100, cy=100, r=80, ir=50;
  const total = segments.reduce((s,x)=>s+x.value, 0);
  if (total===0) return (
    <svg viewBox="0 0 200 200" width="100%">
      <circle cx={cx} cy={cy} r={r} fill="#f0f2f8"/>
      <circle cx={cx} cy={cy} r={ir} fill="white"/>
      <text x={cx} y={cy+5} textAnchor="middle" fontSize={11} fill="#ccc">없음</text>
    </svg>
  );
  let angle = -Math.PI/2;
  const slices = segments.filter(s=>s.value>0).map(s => {
    const sweep = Math.min(s.value/total*2*Math.PI, 2*Math.PI-0.0001);
    const end=angle+sweep, lg=sweep>Math.PI?1:0;
    const [c1,s1,c2,s2]=[Math.cos(angle),Math.sin(angle),Math.cos(end),Math.sin(end)];
    const d=`M${cx+r*c1} ${cy+r*s1} A${r} ${r} 0 ${lg} 1 ${cx+r*c2} ${cy+r*s2} L${cx+ir*c2} ${cy+ir*s2} A${ir} ${ir} 0 ${lg} 0 ${cx+ir*c1} ${cy+ir*s1}Z`;
    angle=end; return { color:s.color, d };
  });
  return (
    <svg viewBox="0 0 200 200" width="100%">
      {slices.map((s,i)=><path key={i} d={s.d} fill={s.color} stroke="#fff" strokeWidth={2}/>)}
      <circle cx={cx} cy={cy} r={ir} fill="white"/>
    </svg>
  );
}

function LabeledDonut({ segments }) {
  const cx=100, cy=100, r=90, ir=56, ER=r+12, HL=18, MG=28;
  const total = segments.reduce((s,x)=>s+x.value, 0);
  if (total===0) return (
    <svg viewBox="-100 -25 400 250" width="100%">
      <circle cx={cx} cy={cy} r={r} fill="#f0f2f8"/>
      <circle cx={cx} cy={cy} r={ir} fill="white"/>
    </svg>
  );
  let angle = -Math.PI/2;
  const slices = segments.filter(s=>s.value>0).map(s => {
    const pct=s.value/total*100, sweep=Math.min(pct/100*2*Math.PI, 2*Math.PI-0.0001);
    const sa=angle, ea=angle+sweep, mid=(sa+ea)/2, lg=sweep>Math.PI?1:0;
    const [c1,s1,c2,s2]=[Math.cos(sa),Math.sin(sa),Math.cos(ea),Math.sin(ea)];
    const d=`M${cx+r*c1} ${cy+r*s1} A${r} ${r} 0 ${lg} 1 ${cx+r*c2} ${cy+r*s2} L${cx+ir*c2} ${cy+ir*s2} A${ir} ${ir} 0 ${lg} 0 ${cx+ir*c1} ${cy+ir*s1}Z`;
    angle=ea;
    return { ...s, d, pct, cos:Math.cos(mid), sin:Math.sin(mid), isRight:Math.cos(mid)>=0 };
  });
  const spreadY = g => {
    const sorted=[...g].sort((a,b)=>a.sin-b.sin), out=[];
    for (let i=0;i<sorted.length;i++) {
      const nat=cy+ER*sorted[i].sin, fy=i===0?nat:Math.max(nat,out[i-1].finalY+MG);
      out.push({...sorted[i],finalY:fy});
    }
    return out;
  };
  const pos=[...spreadY(slices.filter(s=>s.isRight)),...spreadY(slices.filter(s=>!s.isRight))];
  return (
    <svg viewBox="-100 -25 400 250" width="100%">
      {slices.map((s,i)=><path key={i} d={s.d} fill={s.color} stroke="#fff" strokeWidth={2}/>)}
      <circle cx={cx} cy={cy} r={ir} fill="white"/>
      {pos.map((s,i)=>{
        const x1=cx+r*s.cos,y1=cy+r*s.sin,x2=cx+ER*s.cos,y2=s.finalY;
        const x3=x2+(s.isRight?HL:-HL),tx=x3+(s.isRight?3:-3),anchor=s.isRight?"start":"end";
        return (
          <g key={i}>
            <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={s.color} strokeWidth={1}/>
            <line x1={x2} y1={y2} x2={x3} y2={y2} stroke={s.color} strokeWidth={1}/>
            <circle cx={x1} cy={y1} r={2} fill={s.color}/>
            <text x={tx} y={y2-5} fontSize={14} fontWeight="700" fill={s.color} textAnchor={anchor}>{s.label}</text>
            <text x={tx} y={y2+11} fontSize={14} fill="#555" textAnchor={anchor}>{s.pct.toFixed(1)}%</text>
          </g>
        );
      })}
    </svg>
  );
}

function MiniLegend({ items, total }) {
  return items.map((item,i)=>(
    <div key={i} style={{ display:"flex", alignItems:"center", gap:5, marginBottom:4 }}>
      <div style={{ width:7, height:7, borderRadius:1, background:item.color, flexShrink:0 }}/>
      <span style={{ fontSize:10, color:"#555", fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.label}</span>
      <span style={{ marginLeft:"auto", fontSize:10, color:"#888", whiteSpace:"nowrap" }}>
        {total>0?(item.value/total*100).toFixed(1)+"%":"0%"}
      </span>
    </div>
  ));
}

function Calculator() {
  const [expr,setExpr]=useState(""), [result,setResult]=useState(null), [error,setError]=useState(false);
  const calc=()=>{
    if(!expr.trim())return;
    try {
      const c=expr.replace(/,/g,"").replace(/[^0-9+\-*/().%\s]/g,"");
      const r=Function('"use strict";return('+c+')')();
      if(typeof r!=="number"||!isFinite(r)){setError(true);setResult("오류");return;}
      setError(false); setResult(Math.round(r*10000)/10000);
    } catch(e){setError(true);setResult("오류");}
  };
  return (
    <div style={{ minWidth:0 }}>
      <div style={{ display:"flex", gap:3 }}>
        <input value={expr} onChange={e=>{setExpr(e.target.value);setResult(null);}} onKeyDown={e=>e.key==="Enter"&&calc()} placeholder="예: 100+200"
          style={{ flex:1, minWidth:0, width:0, fontSize:11, padding:"5px 6px", border:"1px solid #dde1ec", borderRadius:6, outline:"none", background:"#f7f8fc" }}/>
        <button onClick={calc} style={{ flexShrink:0, background:"#1a1a2e", color:"#fff", border:"none", borderRadius:6, padding:"5px 8px", fontSize:11, fontWeight:700, cursor:"pointer" }}>=</button>
      </div>
      {result!==null&&<div style={{ marginTop:5, padding:"4px 8px", borderRadius:6, background:error?"#fff0f0":"#f0f7ff", fontSize:13, fontWeight:700, color:error?"#c92a2a":"#1a1a2e", textAlign:"right" }}>{error?result:Number(result).toLocaleString()}</div>}
      <div style={{ marginTop:4, fontSize:8, color:"#ccc" }}>+ − * / ( ) · Enter</div>
    </div>
  );
}

function FitText({ children, width="68px", maxFs=13, minFs=7 }) {
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current; if(!el)return;
    let fs=maxFs; el.style.fontSize=fs+"px";
    while(el.scrollWidth>el.clientWidth&&fs>minFs){fs-=0.5;el.style.fontSize=fs+"px";}
  },[children]);
  return <span ref={ref} style={{ display:"inline-block", width, minWidth:width, overflow:"hidden", whiteSpace:"nowrap", fontWeight:600, color:"#1a1a2e", verticalAlign:"middle" }}>{children}</span>;
}

function SourcesCell({ sources }) {
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current; if(!el)return;
    let fs=8; el.style.fontSize=fs+"px";
    while(el.scrollWidth>el.clientWidth&&fs>5){fs-=0.5;el.style.fontSize=fs+"px";}
  },[sources]);
  return (
    <div ref={ref} style={{ paddingLeft:4, borderLeft:"2px solid #e0e4ef", overflow:"hidden" }}>
      {sources&&Array.from({length:Math.ceil(sources.length/3)},(_,r)=>(
        <div key={r} style={{ display:"flex", gap:3, marginBottom:2 }}>
          {sources.slice(r*3,r*3+3).map((src,i)=>(
            <span key={i} style={{ background:"#f0f2f8", borderRadius:10, padding:"1px 5px", whiteSpace:"nowrap", color:"#888" }}>
              {src.accName}: {fmt(src.amount)}
            </span>
          ))}
        </div>
      ))}
    </div>
  );
}

function AccChip({ a, isActive, isDragOver, rowColor, onAccDragStart, onAccDragEnd, onAccDragOver, onAccDrop, onClick, onRename, onConfirmDelete, renamingId, renameVal, setRenameVal, saveRename, setRenamingId }) {

        background:isActive?ac.active:ac.light, border:"1px solid "+(isActive?ac.active:ac.border),
        opacity:isDragOver?0.5:1, flexShrink:0 }}>
      <div style={{ width:5, height:5, borderRadius:"50%", background:ac.dot, marginRight:1, flexShrink:0 }}/>
      {renamingId===a.id
        ? <input autoFocus value={renameVal} onChange={e=>setRenameVal(e.target.value)} onClick={e=>e.stopPropagation()}
            onKeyDown={e=>{if(e.key==="Enter")saveRename();if(e.key==="Escape")setRenamingId(null);}}
            style={{ fontSize:10, width:60, border:"none", outline:"none", background:"transparent", fontWeight:600, color:isActive?"#fff":"#333" }}/>
        : <span style={{ fontSize:10, fontWeight:600, color:isActive?"#fff":"#333", whiteSpace:"nowrap" }}>{a.name}</span>
      }
      <button onClick={e=>{e.stopPropagation();onRename();}} style={{...ghostBtn,fontSize:9,padding:0}}>✏️</button>
      <button onClick={e=>{e.stopPropagation();onConfirmDelete();}} style={{...ghostBtn,fontSize:9,padding:0}}>✕</button>
    </div>
  );
}

// ── 로그인 화면 ────────────────────────────────────────────────────
function LoginPage() {
  const [email,setEmail]=useState(""), [pw,setPw]=useState("");
  const [err,setErr]=useState(""), [info,setInfo]=useState("");
  const [loading,setLoading]=useState(false), [isUp,setIsUp]=useState(false);

  const handle=async()=>{
    if(!email||!pw){setErr("이메일과 비밀번호를 입력하세요.");return;}
    setErr(""); setInfo(""); setLoading(true);
    try {
      if(isUp){
        const {error}=await sb.auth.signUp({email,password:pw});
        if(error)setErr(error.message);
        else setInfo("확인 이메일을 보냈습니다. 메일함을 확인해 주세요.");
      } else {
        const {error}=await sb.auth.signInWithPassword({email,password:pw});
        if(error)setErr("이메일 또는 비밀번호가 올바르지 않습니다.");
      }
    } finally {setLoading(false);}
  };

  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100vh", background:"#f7f8fc", padding:20 }}>
      <div style={{ background:"#fff", borderRadius:16, padding:"36px 40px", width:"100%", maxWidth:380, boxShadow:"0 4px 24px rgba(0,0,0,0.08)" }}>
        <div style={{ fontSize:32, marginBottom:6 }}>📊</div>
        <h1 style={{ fontSize:22, fontWeight:800, color:"#1a1a2e", marginBottom:4 }}>주식 포트폴리오</h1>
        <p style={{ fontSize:13, color:"#888", marginBottom:28 }}>{isUp?"새 계정을 만들어주세요.":"계정에 로그인하세요."}</p>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          <input type="email" placeholder="이메일" value={email}
            onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()}
            style={{ padding:"10px 12px", fontSize:13, border:"1px solid #e0e4ef", borderRadius:8, outline:"none" }}/>
          <input type="password" placeholder="비밀번호 (6자 이상)" value={pw}
            onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()}
            style={{ padding:"10px 12px", fontSize:13, border:"1px solid #e0e4ef", borderRadius:8, outline:"none" }}/>
          {err  && <div style={{ fontSize:12, color:"#c92a2a", background:"#fff3f3", padding:"8px 10px", borderRadius:6 }}>{err}</div>}
          {info && <div style={{ fontSize:12, color:"#2a9d5c", background:"#e6f7ee", padding:"8px 10px", borderRadius:6 }}>{info}</div>}
          <button onClick={handle} disabled={loading}
            style={{ padding:11, background:"#1a1a2e", color:"#fff", border:"none", borderRadius:8, fontSize:14, fontWeight:700, cursor:"pointer", marginTop:4, opacity:loading?0.7:1 }}>
            {loading?"처리 중...":isUp?"회원가입":"로그인"}
          </button>
          <button onClick={()=>{setIsUp(!isUp);setErr("");setInfo("");}}
            style={{ background:"none", border:"none", fontSize:12, color:"#888", cursor:"pointer", textDecoration:"underline" }}>
            {isUp?"기존 계정으로 로그인 →":"계정이 없으신가요? 회원가입 →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── 포트폴리오 앱 ─────────────────────────────────────────────────
function Portfolio({ user }) {
  const [data,setData]       = useState({accounts:[],activeId:null});
  const [loaded,setLoaded]   = useState(false);
  const [saving,setSaving]   = useState(false);
  const [showAcc,setShowAcc] = useState(false);
  const [newAccName,setNewAccName] = useState("");
  const [form,setForm]       = useState({name:"",sector:"",amount:"",category:"cyclical"});
  const [editId,setEditId]   = useState(null);
  const [editForm,setEditForm] = useState({});
  const [tab,setTab]         = useState("all");
  const [err,setErr]         = useState("");
  const [renamingId,setRenamingId]   = useState(null);
  const [renameVal,setRenameVal]     = useState("");
  const [confirmDeleteAccId,setConfirmDeleteAccId] = useState(null);
  const [dragIdx,setDragIdx]         = useState(null);
  const [dragOverIdx,setDragOverIdx] = useState(null);
  const [accDragSrc,setAccDragSrc]   = useState(null);
  const [accDragTgt,setAccDragTgt]   = useState(null);
  const nameRef   = useRef(null);
  const saveTimer = useRef(null);
  const userRef   = useRef(user);
  useEffect(()=>{userRef.current=user;},[user]);

  // ── Supabase 불러오기 ──
  useEffect(()=>{
    (async()=>{
      const {data:row}=await sb.from("portfolios").select("data").eq("user_id",user.id).maybeSingle();
      if(row?.data){
        const d=row.data;
        if(d.accounts) d.accounts=migrateAccounts(d.accounts);
        setData(d);
      }
      setLoaded(true);
    })();
  },[user.id]);

  // ── 자동 저장 (800ms 디바운스) ──
  const persist=(next)=>{
    setData(next);
    if(saveTimer.current) clearTimeout(saveTimer.current);
    setSaving(true);
    saveTimer.current=setTimeout(async()=>{
      await sb.from("portfolios").upsert(
        {user_id:userRef.current.id, data:next, updated_at:new Date().toISOString()},
        {onConflict:"user_id"}
      );
      setSaving(false);
    },800);
  };

  const handleLogout=()=>sb.auth.signOut();

  // ── 계산값 ──
  const isCombined = data.activeId===COMBINED;
  const activeAcc  = data.accounts.find(a=>a.id===data.activeId)||null;
  const stocks     = activeAcc?activeAcc.stocks:[];
  const total      = stocks.reduce((s,x)=>s+x.amount,0);
  const displayed  = tab==="all"?stocks:stocks.filter(x=>x.category===tab);
  const accRows    = [0,1,2].map(r=>data.accounts.filter(a=>(a.row??0)===r));

  const cMap={};
  data.accounts.forEach(acc=>acc.stocks.forEach(s=>{
    const k=s.name.trim().toLowerCase();
    if(!cMap[k]) cMap[k]={id:k,name:s.name,amount:0,category:s.category,sector:s.sector||"",sources:[]};
    cMap[k].amount+=s.amount; cMap[k].sources.push({accName:acc.name,amount:s.amount});
  }));
  const combinedStocks  = Object.values(cMap).sort((a,b)=>
    CAT_ORDER[a.category]!==CAT_ORDER[b.category]?CAT_ORDER[a.category]-CAT_ORDER[b.category]:b.amount-a.amount
  );
  const combinedTotal   = combinedStocks.reduce((s,x)=>s+x.amount,0);
  const combinedDisplay = tab==="all"?combinedStocks:combinedStocks.filter(x=>x.category===tab);

  const T = isCombined
    ? {total:combinedTotal,cash:sumCat(combinedStocks,"cash"),ce:sumCat(combinedStocks,"cash_eq"),cyc:sumCat(combinedStocks,"cyclical"),def:sumCat(combinedStocks,"defensive"),oth:sumCat(combinedStocks,"other")}
    : {total,cash:sumCat(stocks,"cash"),ce:sumCat(stocks,"cash_eq"),cyc:sumCat(stocks,"cyclical"),def:sumCat(stocks,"defensive"),oth:sumCat(stocks,"other")};
  const invTotal=T.total-T.cash;

  const updateStocks=fn=>persist({...data,accounts:data.accounts.map(a=>a.id===data.activeId?{...a,stocks:fn(a.stocks)}:a)});

  // ── 계좌 액션 ──
  const addAccount=()=>{
    if(!newAccName.trim())return;
    const rowCounts=accRows.map(r=>r.length);
    const targetRow=rowCounts.findIndex(c=>c<ROW_SIZE);
    if(targetRow<0)return;
    const id=Date.now();
    persist({...data,accounts:[...data.accounts,{id,name:newAccName.trim(),stocks:[],row:targetRow}],activeId:id});
    setNewAccName(""); setShowAcc(false); setTab("all");
  };
  const deleteAccount=id=>{
    const next=data.accounts.filter(a=>a.id!==id);
    persist({...data,accounts:next,activeId:next.length?(data.activeId===id?next[0].id:data.activeId):null});
    setConfirmDeleteAccId(null);
  };
  const switchAccount=id=>{persist({...data,activeId:id});setEditId(null);setTab("all");};

  // ── 종목 액션 ──
  const addStock=()=>{
    if(!form.name.trim()){setErr("종목명을 입력하세요.");return;}
    const amt=parseFloat(form.amount);
    if(!form.amount||isNaN(amt)||amt<=0){setErr("유효한 금액을 입력하세요.");return;}
    setErr("");
    updateStocks(ss=>[...ss,{id:Date.now(),name:form.name.trim(),sector:form.sector.trim(),amount:amt,category:form.category}]);
    setForm(f=>({name:"",sector:"",amount:"",category:f.category}));
    setTimeout(()=>nameRef.current&&nameRef.current.focus(),0);
  };
  const deleteStock =id=>updateStocks(ss=>ss.filter(x=>x.id!==id));
  const startEdit   =s=>{setEditId(s.id);setEditForm({name:s.name,sector:s.sector||"",amount:String(s.amount),category:s.category});};
  const saveEdit    =()=>{
    const amt=parseFloat(editForm.amount);
    if(!editForm.name.trim()||isNaN(amt)||amt<=0)return;
    updateStocks(ss=>ss.map(x=>x.id===editId?{...x,name:editForm.name.trim(),sector:editForm.sector?.trim()||"",amount:amt,category:editForm.category}:x));
    setEditId(null);
  };
  const saveRename=()=>{
    if(!renameVal.trim())return;
    persist({...data,accounts:data.accounts.map(a=>a.id===renamingId?{...a,name:renameVal.trim()}:a)});
    setRenamingId(null);
  };

  // ── 종목 드래그 ──
  const onDragStart=(e,i)=>{setDragIdx(i);e.currentTarget.style.opacity="0.4";};
  const onDragEnd  =e=>{e.currentTarget.style.opacity="1";setDragIdx(null);setDragOverIdx(null);};
  const onDragOver =(e,i)=>{e.preventDefault();if(dragIdx!==null&&dragIdx!==i)setDragOverIdx(i);};
  const onDrop     =(e,i)=>{
    e.preventDefault(); if(dragIdx===null||dragIdx===i)return;
    updateStocks(ss=>{
      const arr=[...ss],fi=arr.findIndex(x=>x.id===displayed[dragIdx].id),ti=arr.findIndex(x=>x.id===displayed[i].id);
      const [m]=arr.splice(fi,1); arr.splice(ti,0,m); return arr;
    });
    setDragIdx(null); setDragOverIdx(null);
  };

  // ── 계좌 드래그 ──
  const onAccDragStart =(e,row,idx)=>{setAccDragSrc({row,idx});e.currentTarget.style.opacity="0.4";};
  const onAccDragEnd   =e=>{e.currentTarget.style.opacity="1";setAccDragSrc(null);setAccDragTgt(null);};
  const onAccDragOver  =(e,row,idx)=>{
    e.preventDefault();
    if(accDragSrc&&!(accDragSrc.row===row&&accDragSrc.idx===idx))setAccDragTgt({row,idx});
  };
  const doAccDrop=(targetRow,targetIdx)=>{
    if(!accDragSrc)return;
    const srcAcc=accRows[accDragSrc.row][accDragSrc.idx]; if(!srcAcc)return;
    if(accDragSrc.row===targetRow&&accDragSrc.idx===targetIdx){setAccDragSrc(null);setAccDragTgt(null);return;}
    const updated=data.accounts.map(a=>a.id===srcAcc.id?{...a,row:targetRow}:a);
    const rows=[0,1,2].map(r=>updated.filter(a=>(a.row??0)===r));
    const si=rows[targetRow].findIndex(a=>a.id===srcAcc.id);
    if(si!==-1)rows[targetRow].splice(si,1);
    rows[targetRow].splice(Math.min(targetIdx,rows[targetRow].length),0,{...srcAcc,row:targetRow});
    persist({...data,accounts:rows.flat()});
    setAccDragSrc(null); setAccDragTgt(null);
  };
  const onAccDrop    =(e,row,idx)=>{e.preventDefault();doAccDrop(row,idx);};
  const onRowDrop    =(e,row)=>{e.preventDefault();doAccDrop(row,accRows[row].length);};
  const onRowDragOver=(e,row)=>{e.preventDefault();if(accDragSrc)setAccDragTgt({row,idx:accRows[row].length});};

  if(!loaded) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", color:"#888", fontFamily:"'Segoe UI',sans-serif" }}>
      불러오는 중...
    </div>
  );

  const chipProps=(a,row,idx)=>({
    a, isActive:a.id===data.activeId,
    isDragOver:accDragTgt?.row===row&&accDragTgt?.idx===idx,
    rowColor:getRowColor(row),
    onAccDragStart:e=>onAccDragStart(e,row,idx), onAccDragEnd,
    onAccDragOver:e=>onAccDragOver(e,row,idx),
    onAccDrop:e=>onAccDrop(e,row,idx),
    onClick:()=>switchAccount(a.id),
    onRename:()=>{setRenamingId(a.id);setRenameVal(a.name);},
    onConfirmDelete:()=>setConfirmDeleteAccId(a.id),
    renamingId, renameVal, setRenameVal, saveRename, setRenamingId,
  });

  const SummaryCard=()=>(
    <div style={{ background:"#fff", border:"1px solid #e0e4ef", borderRadius:10, padding:"8px 10px", display:"flex", flexDirection:"column", justifyContent:"space-around" }}>
      {[
        {label:"보유현금",    value:T.cash,   color:catColor.cash},
        {label:"총투자금액",  value:invTotal, color:"#e05c5c"},
        {label:"현금성자산",  value:T.ce,     color:catColor.cash_eq},
        {label:"총 보유금액", value:T.total,  color:"#1a1a2e", bold:true},
      ].map((item,i)=>(
        <div key={i} style={{ borderBottom:i<3?"1px solid #f0f2f8":"none", padding:"2px 0 4px 0" }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#888", marginBottom:1 }}>{item.label}</div>
          <div style={{ fontSize:item.bold?14:13, fontWeight:700, color:item.color }}>{fmt(item.value)}</div>
        </div>
      ))}
    </div>
  );

  const COMB_COLS="16px 52px 55px 68px 50px 1fr 72px 28%";

  const StockRow=({s,pct,isLast,isCombinedRow})=>{
    const isEditing=!isCombinedRow&&editId===s.id;
    return (
      <div draggable={!isCombinedRow&&!isEditing}
        onDragStart={!isCombinedRow?e=>onDragStart(e,s._idx):undefined}
        onDragEnd={!isCombinedRow?onDragEnd:undefined}
        onDragOver={!isCombinedRow?e=>onDragOver(e,s._idx):undefined}
        onDrop={!isCombinedRow?e=>onDrop(e,s._idx):undefined}
        style={{ borderBottom:isLast?"none":"1px solid #f0f2f8", borderTop:!isCombinedRow&&dragOverIdx===s._idx?"2px solid #4f8ef7":"none" }}>
        {isEditing?(
          <div style={{ padding:"10px 14px", background:"#fafbff", display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:16, color:"#ccc" }}>⠿</span>
            <input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} placeholder="종목명"
              style={{ flex:"1 1 80px", padding:"5px 8px", fontSize:12, border:"1px solid #b8d0f7", borderRadius:6, outline:"none" }}/>
            <input value={editForm.sector||""} onChange={e=>setEditForm({...editForm,sector:e.target.value})} placeholder="섹터"
              style={{ flex:"1 1 60px", padding:"5px 8px", fontSize:12, border:"1px solid #b8d0f7", borderRadius:6, outline:"none" }}/>
            <input type="number" value={editForm.amount} onChange={e=>setEditForm({...editForm,amount:e.target.value})} placeholder="금액"
              style={{ flex:"1 1 70px", padding:"5px 8px", fontSize:12, border:"1px solid #b8d0f7", borderRadius:6, outline:"none" }}/>
            {CATS.map(cat=>(
              <button key={cat} onClick={()=>setEditForm({...editForm,category:cat})}
                style={{ fontSize:10, fontWeight:600, padding:"5px 8px", borderRadius:6, cursor:"pointer",
                  border:"1px solid "+(editForm.category===cat?catColor[cat]:"#dde1ec"),
                  background:editForm.category===cat?catColor[cat]:"#f7f8fc",
                  color:editForm.category===cat?"#fff":"#666" }}>{catShort[cat]}</button>
            ))}
            <button onClick={saveEdit} style={smBtn("#1a1a2e","#fff")}>저장</button>
            <button onClick={()=>setEditId(null)} style={smBtn("#eee","#555")}>취소</button>
          </div>
        ):isCombinedRow?(
          <div style={{ display:"grid", gridTemplateColumns:COMB_COLS, alignItems:"center", padding:"7px 14px", columnGap:4 }}>
            <span/>
            <span style={tagSt(s.category)}>{catLabel[s.category]}</span>
            <span style={{ fontSize:9, color:"#666", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{s.sector||""}</span>
            <FitText width="68px">{s.name}</FitText>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end" }}>
              <span style={{ fontSize:8, color:"#bbb", lineHeight:1 }}>비중</span>
              <span style={{ fontSize:11, fontWeight:700, color:catColor[s.category], lineHeight:1.4 }}>{pct.toFixed(1)}%</span>
            </div>
            <div style={{ height:10, background:"#f0f2f8", borderRadius:5 }}>
              <div style={{ width:pct+"%", height:"100%", background:catColor[s.category], borderRadius:5, transition:"width 0.3s" }}/>
            </div>
            <span style={{ fontSize:12, fontWeight:700, color:catColor[s.category], textAlign:"left" }}>{fmt(s.amount)}</span>
            <SourcesCell sources={s.sources}/>
          </div>
        ):(
          <div style={{ display:"grid", gridTemplateColumns:"16px 1fr 100px 60px", alignItems:"center", padding:"7px 14px", cursor:"grab" }}>
            <span style={{ fontSize:16, color:"#ccc", userSelect:"none" }}>⠿</span>
            <div style={{ minWidth:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={tagSt(s.category)}>{catLabel[s.category]}</span>
                {s.sector&&<span style={sectorSt}>{s.sector}</span>}
                <FitText>{s.name}</FitText>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", width:46, flexShrink:0 }}>
                  <span style={{ fontSize:8, color:"#bbb", lineHeight:1 }}>비중</span>
                  <span style={{ fontSize:11, fontWeight:700, color:catColor[s.category], lineHeight:1.4 }}>{pct.toFixed(1)}%</span>
                </div>
                <div style={{ flex:1, height:10, background:"#f0f2f8", borderRadius:5, minWidth:20, marginLeft:6 }}>
                  <div style={{ width:pct+"%", height:"100%", background:catColor[s.category], borderRadius:5, transition:"width 0.3s" }}/>
                </div>
              </div>
            </div>
            <span style={{ textAlign:"right", fontSize:12, fontWeight:700, color:catColor[s.category] }}>{fmt(s.amount)}</span>
            <div style={{ display:"flex", justifyContent:"center", gap:4 }}>
              <button onClick={()=>startEdit(s)} style={iconBtn}>✏️</button>
              <button onClick={()=>deleteStock(s.id)} style={iconBtn}>🗑️</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ fontFamily:"'Segoe UI',sans-serif", maxWidth:760, margin:"0 auto", padding:"18px 14px", background:"#f7f8fc", minHeight:"100vh" }}>

      {/* 헤더 */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <h1 style={{ fontSize:20, fontWeight:700, color:"#1a1a2e", margin:0 }}>📊 주식 포트폴리오</h1>
          {saving&&<span style={{ fontSize:10, color:"#bbb" }}>저장 중...</span>}
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button className="no-print" onClick={()=>window.print()}
            style={{ padding:"5px 14px", background:"#1a1a2e", color:"#fff", border:"none", borderRadius:8, fontSize:12, fontWeight:600, cursor:"pointer" }}>
            📄 PDF 저장
          </button>
          <button onClick={handleLogout}
            style={{ padding:"5px 12px", background:"#fff", color:"#888", border:"1px solid #e0e4ef", borderRadius:8, fontSize:12, cursor:"pointer" }}>
            로그아웃
          </button>
        </div>
      </div>

      {/* 계좌 탭 */}
      <div className="no-print" style={{ display:"flex", alignItems:"stretch", marginBottom:6, background:"#fff", border:"1px solid #e0e4ef", borderRadius:12, padding:"8px 10px" }}>
        <div style={{ flex:1, minWidth:0, display:"flex", flexDirection:"column", gap:5 }}>
          {[0,1,2].map(rowIdx=>{
            const rowAccs=accRows[rowIdx], rc=getRowColor(rowIdx);
            const isDropTarget=accDragTgt?.row===rowIdx&&accDragTgt?.idx===rowAccs.length;
            return (
              <div key={rowIdx}
                onDragOver={e=>onRowDragOver(e,rowIdx)} onDrop={e=>onRowDrop(e,rowIdx)}
                style={{ display:"flex", gap:5, flexWrap:"nowrap", overflowX:"auto", alignItems:"center",
                  borderLeft:`3px solid ${rc.border}`, paddingLeft:6, minHeight:32,
                  background:isDropTarget?rc.light:"transparent", borderRadius:6, transition:"background 0.15s" }}>
                {rowAccs.map((a,idx)=><AccChip key={a.id} {...chipProps(a,rowIdx,idx)}/>)}
              </div>
            );
          })}
        </div>
        <div style={{ display:"flex", alignItems:"center", margin:"0 10px", flexShrink:0 }}>
          {showAcc?(
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              <input autoFocus placeholder="계좌명" value={newAccName} onChange={e=>setNewAccName(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")addAccount();if(e.key==="Escape")setShowAcc(false);}}
                style={{ fontSize:11, padding:"4px 8px", border:"1px solid #dde1ec", borderRadius:20, outline:"none", width:80 }}/>
              <div style={{ display:"flex", gap:4 }}>
                <button onClick={addAccount} style={{...smBtn("#1a1a2e","#fff"),padding:"3px 8px",fontSize:11}}>추가</button>
                <button onClick={()=>setShowAcc(false)} style={{...smBtn("#eee","#555"),padding:"3px 8px",fontSize:11}}>취소</button>
              </div>
            </div>
          ):(
            <button onClick={()=>setShowAcc(true)}
              style={{ fontSize:11, fontWeight:600, padding:"4px 10px", borderRadius:20, border:"1px solid #dde1ec", background:"#eef", color:"#1a1a2e", cursor:"pointer", whiteSpace:"nowrap" }}>
              + 계좌 추가
            </button>
          )}
        </div>
        <div style={{ width:1, background:"#e0e4ef", flexShrink:0 }}/>
        {data.accounts.length>=2&&(
          <div style={{ display:"flex", alignItems:"center", marginLeft:10, flexShrink:0 }}>
            <button onClick={()=>switchAccount(COMBINED)}
              style={{ fontSize:11, fontWeight:600, padding:"4px 12px", borderRadius:20, cursor:"pointer", whiteSpace:"nowrap",
                border:"1px solid "+(isCombined?"#6c47d4":"#dde1ec"),
                background:isCombined?"#6c47d4":"#fff", color:isCombined?"#fff":"#555" }}>🔀 통합</button>
          </div>
        )}
      </div>

      {confirmDeleteAccId&&(()=>{
        const a=data.accounts.find(x=>x.id===confirmDeleteAccId);
        return a?(
          <div style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 12px", background:"#fff3f3", border:"1px solid #f7c9c9", borderRadius:8, marginBottom:8, fontSize:12 }}>
            <span style={{ color:"#c92a2a", fontWeight:600 }}>"{a.name}" 계좌를 삭제하시겠습니까?</span>
            <button onClick={()=>deleteAccount(confirmDeleteAccId)} style={{...smBtn("#c92a2a","#fff"),padding:"3px 10px",fontSize:11}}>삭제</button>
            <button onClick={()=>setConfirmDeleteAccId(null)} style={{...smBtn("#eee","#555"),padding:"3px 10px",fontSize:11}}>취소</button>
          </div>
        ):null;
      })()}

      {!data.activeId
        ?<div style={{ textAlign:"center", color:"#aaa", fontSize:14, padding:"60px 0" }}>위에서 계좌를 추가해주세요.</div>
        :<>
          {!isCombined&&(
            <input placeholder="메모..." value={activeAcc?.memo||""}
              onChange={e=>persist({...data,accounts:data.accounts.map(a=>a.id===data.activeId?{...a,memo:e.target.value}:a)})}
              style={{ width:"100%", fontSize:13, fontWeight:600, color:"#333", border:"none", borderBottom:"1px solid #dde1ec", background:"transparent", outline:"none", padding:"2px 4px", marginBottom:10 }}
            />
          )}

          {isCombined?(
            <div style={{ display:"grid", gridTemplateColumns:"6fr 4fr", gap:10, marginBottom:14 }}>
              <div style={{ display:"grid", gridTemplateColumns:"minmax(117px,auto) 1fr", gap:10 }}>
                <SummaryCard/>
                <div style={{ background:"#fff", border:"1px solid #e0e4ef", borderRadius:10, padding:"6px 8px" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#555", marginBottom:2 }}>전체 비중</div>
                  <div style={{ transform:"scale(0.9)", transformOrigin:"top center" }}>
                    <LabeledDonut segments={CATS.map(c=>({label:catLabel[c],value:sumCat(combinedStocks,c),color:catColor[c]})).filter(x=>x.value>0)}/>
                  </div>
                </div>
              </div>
              <div style={{ background:"#fff", border:"1px solid #e0e4ef", borderRadius:10, padding:"10px 12px", display:"flex", flexDirection:"column", minWidth:0, overflow:"hidden" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#555", marginBottom:6 }}>메모</div>
                <textarea placeholder="메모를 입력하세요..." value={data.combinedMemo||""}
                  onChange={e=>persist({...data,combinedMemo:e.target.value})}
                  style={{ flex:1, resize:"none", border:"1px solid #e0e4ef", borderRadius:6, padding:"6px 8px", fontSize:12, color:"#333", background:"#f7f8fc", outline:"none", fontFamily:"inherit", minHeight:80 }}
                />
              </div>
            </div>
          ):(
            <div style={{ display:"grid", gridTemplateColumns:"minmax(117px,0.26fr) 1fr 0.9fr", gap:10, marginBottom:14 }}>
              <SummaryCard/>
              <div style={{ background:"#fff", border:"1px solid #e0e4ef", borderRadius:10, padding:"10px 12px" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#555", marginBottom:2 }}>자산 비중</div>
                <LabeledDonut segments={CATS.map(c=>({label:catLabel[c],value:sumCat(stocks,c),color:catColor[c]})).filter(x=>x.value>0)}/>
              </div>
              <div style={{ background:"#fff", border:"1px solid #e0e4ef", borderRadius:10, padding:"10px 12px", display:"flex", flexDirection:"column", minWidth:0, overflow:"hidden" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#555", marginBottom:6 }}>계산기</div>
                <Calculator/>
              </div>
            </div>
          )}

          {!isCombined&&(
            <div className="no-print" style={{ background:"#fff", border:"1px solid #e0e4ef", borderRadius:12, padding:14, marginBottom:14 }}>
              <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"nowrap" }}>
                <input ref={nameRef} placeholder="종목명" value={form.name}
                  onChange={e=>setForm({...form,name:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addStock()}
                  style={{ flex:"2 1 70px", minWidth:0, padding:"7px 8px", fontSize:12, border:"1px solid #dde1ec", borderRadius:8, outline:"none", background:"#f7f8fc" }}/>
                <input placeholder="금액 ($)" type="number" value={form.amount}
                  onChange={e=>setForm({...form,amount:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addStock()}
                  style={{ flex:"1 1 60px", minWidth:0, padding:"7px 8px", fontSize:12, border:"1px solid #dde1ec", borderRadius:8, outline:"none", background:"#f7f8fc" }}/>
                <input placeholder="섹터" value={form.sector}
                  onChange={e=>setForm({...form,sector:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addStock()}
                  style={{ flex:"1 1 50px", minWidth:0, padding:"7px 8px", fontSize:12, border:"1px solid #dde1ec", borderRadius:8, outline:"none", background:"#f7f8fc" }}/>
                {CATS.map(cat=>(
                  <button key={cat} onClick={()=>setForm({...form,category:cat})}
                    style={{ fontSize:10, fontWeight:600, padding:"6px 7px", borderRadius:7, cursor:"pointer", flexShrink:0,
                      border:"1px solid "+(form.category===cat?catColor[cat]:"#dde1ec"),
                      background:form.category===cat?catColor[cat]:"#f7f8fc",
                      color:form.category===cat?"#fff":"#666" }}>{catShort[cat]}</button>
                ))}
                <button onClick={addStock} style={{...smBtn("#1a1a2e","#fff"),padding:"7px 12px",fontSize:12,flexShrink:0}}>추가</button>
              </div>
              {err&&<div style={{ fontSize:11, color:"#e05252", marginTop:6 }}>{err}</div>}
            </div>
          )}

          <div className="no-print" style={{ display:"flex", gap:5, marginBottom:10, flexWrap:"wrap" }}>
            {[["all","전체"],...CATS.map(c=>[c,catLabel[c]])].map(([v,l])=>(
              <button key={v} onClick={()=>setTab(v)}
                style={{ fontSize:11, fontWeight:600, padding:"5px 12px", borderRadius:20, cursor:"pointer", border:"1px solid #dde1ec",
                  background:tab===v?"#1a1a2e":"#fff", color:tab===v?"#fff":"#555" }}>{l}</button>
            ))}
            {!isCombined&&<span style={{ marginLeft:"auto", fontSize:11, color:"#bbb", alignSelf:"center" }}>⠿ 드래그로 순서 변경</span>}
            {isCombined &&<span style={{ marginLeft:"auto", fontSize:11, color:"#888", alignSelf:"center" }}>모든 계좌 합산 · 읽기 전용</span>}
          </div>

          {isCombined?(
            <div style={{ background:"#fff", border:"1px solid #e0e4ef", borderRadius:12, overflow:"hidden" }}>
              <div style={{ display:"grid", gridTemplateColumns:COMB_COLS, padding:"7px 14px", background:"#f0f2f8", fontSize:10, fontWeight:700, color:"#888", borderBottom:"1px solid #e8eaf2", columnGap:4 }}>
                <span/><span/><span>섹터</span><span>종목</span><span/><span/><span style={{ textAlign:"left" }}>금액</span><span style={{ paddingLeft:4 }}>계좌별</span>
              </div>
              {combinedDisplay.length===0
                ?<div style={{ textAlign:"center", color:"#bbb", fontSize:13, padding:"30px 0" }}>종목이 없습니다.</div>
                :combinedDisplay.map((s,idx)=>{
                  const pct=combinedTotal>0?s.amount/combinedTotal*100:0;
                  return <StockRow key={s.id} s={s} pct={pct} isLast={idx===combinedDisplay.length-1} isCombinedRow={true}/>;
                })
              }
              {combinedDisplay.length>0&&(
                <div style={{ display:"grid", gridTemplateColumns:COMB_COLS, alignItems:"center", padding:"8px 14px", background:"#f0f2f8", borderTop:"2px solid #e0e4ef", columnGap:4 }}>
                  <span style={{ gridColumn:"1 / 8", fontSize:11, fontWeight:700, color:"#555" }}>합계 ({combinedDisplay.length}종목) · {fmt(combinedTotal)}</span>
                  <span/>
                </div>
              )}
            </div>
          ):(
            <div style={{ background:"#fff", border:"1px solid #e0e4ef", borderRadius:12, overflow:"hidden" }}>
              <div style={{ display:"grid", gridTemplateColumns:"16px 1fr 100px 60px", padding:"7px 14px", background:"#f0f2f8", fontSize:10, fontWeight:700, color:"#888", borderBottom:"1px solid #e8eaf2" }}>
                <span/><span>종목</span><span style={{ textAlign:"right" }}>금액</span><span style={{ textAlign:"center" }}>관리</span>
              </div>
              {displayed.length===0
                ?<div style={{ textAlign:"center", color:"#bbb", fontSize:13, padding:"30px 0" }}>종목이 없습니다.</div>
                :displayed.map((s,idx)=>{
                  const pct=total>0?s.amount/total*100:0;
                  return <StockRow key={s.id} s={{...s,_idx:idx}} pct={pct} isLast={idx===displayed.length-1} isCombinedRow={false}/>;
                })
              }
              {displayed.length>0&&(
                <div style={{ display:"grid", gridTemplateColumns:"16px 1fr 100px 60px", alignItems:"center", padding:"8px 14px", background:"#f0f2f8", borderTop:"2px solid #e0e4ef" }}>
                  <span/>
                  <span style={{ fontSize:11, fontWeight:700, color:"#555" }}>합계 ({displayed.length}종목)</span>
                  <span style={{ textAlign:"right", fontSize:12, fontWeight:700, color:"#1a1a2e" }}>{fmt(displayed.reduce((s,x)=>s+x.amount,0))}</span>
                  <span/>
                </div>
              )}
            </div>
          )}
        </>
      }
    </div>
  );
}

// ── Root ─────────────────────────────────────────────────────────────
function Root() {
  const [user,setUser]               = useState(null);
  const [authLoading,setAuthLoading] = useState(true);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user??null);
      setAuthLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{
      setUser(session?.user??null);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  if(authLoading) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", color:"#888", fontFamily:"'Segoe UI',sans-serif" }}>
      불러오는 중...
    </div>
  );
  return user?<Portfolio user={user}/>:<LoginPage/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);

</script>
</body>
</html>
