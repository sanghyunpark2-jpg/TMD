<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f7f8fc;font-family:'Segoe UI',sans-serif;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{height:4px;width:4px;}
::-webkit-scrollbar-thumb{background:#dde1ec;border-radius:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const CAT_ORDER={cash:0,cash_eq:1,cyclical:2,defensive:3,other:4};
const catColor={cash:"#2a9d5c",cash_eq:"#0096c7",cyclical:"#f7864f",defensive:"#4f8ef7",other:"#909090"};
const catBg={cash:"#e6f7ee",cash_eq:"#d0f0fc",cyclical:"#ffe8d6",defensive:"#ddeaff",other:"#e8e8e8"};
const catBorder={cash:"#9fdbbe",cash_eq:"#90d5f0",cyclical:"#f7c9aa",defensive:"#b8d0f7",other:"#d0d0d0"};
const catLabel={cash:"현금",cash_eq:"현금성자산",cyclical:"경기민감주",defensive:"경기방어주",other:"기타"};
const catShort={cash:"현금",cash_eq:"현금성자산",cyclical:"민감주",defensive:"방어주",other:"기타"};
const COMBINED="__combined__";
const CATS=["cash","cash_eq","cyclical","defensive","other"];
const fmt=n=>"$"+Math.round(Number(n)).toLocaleString("en-US");
const sumCat=(arr,cat)=>arr.filter(x=>x.category===cat).reduce((s,x)=>s+x.amount,0);
const getAC=name=>{
  if(name&&name.startsWith("상현"))return{active:"#3b5bdb",light:"#e8ecfd",border:"#3b5bdb",dot:"#3b5bdb"};
  if(name&&name.startsWith("영주"))return{active:"#c92a2a",light:"#ffe3e3",border:"#c92a2a",dot:"#c92a2a"};
  return{active:"#1a1a2e",light:"#fff",border:"#dde1ec",dot:"#888"};
};
const tagSt=cat=>({fontSize:9,fontWeight:700,background:catBg[cat],color:catColor[cat],border:"1px solid "+catBorder[cat],borderRadius:10,padding:"1px 0",whiteSpace:"nowrap",flexShrink:0,width:52,textAlign:"center",display:"inline-block"});
const smBtn=(bg,col)=>({background:bg,color:col,border:"none",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:600,cursor:"pointer"});
const ib={background:"none",border:"none",cursor:"pointer",fontSize:13,padding:"2px 3px",borderRadius:5};
const gb={background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#aaa",padding:"0 1px"};

function Donut({segments}){
  const cx=100,cy=100,r=80,ir=50,total=segments.reduce((s,x)=>s+x.value,0);
  if(!total)return<svg viewBox="0 0 200 200" width="100%"><circle cx={cx} cy={cy} r={r} fill="#f0f2f8"/><circle cx={cx} cy={cy} r={ir} fill="white"/></svg>;
  let a=-Math.PI/2;
  const sl=segments.filter(s=>s.value>0).map(s=>{
    const sw=Math.min(s.value/total*2*Math.PI,2*Math.PI-0.0001),ea=a+sw,lg=sw>Math.PI?1:0;
    const[c1,s1,c2,s2]=[Math.cos(a),Math.sin(a),Math.cos(ea),Math.sin(ea)];
    const d=`M${cx+r*c1} ${cy+r*s1} A${r} ${r} 0 ${lg} 1 ${cx+r*c2} ${cy+r*s2} L${cx+ir*c2} ${cy+ir*s2} A${ir} ${ir} 0 ${lg} 0 ${cx+ir*c1} ${cy+ir*s1}Z`;
    a=ea;return{color:s.color,d};
  });
  return<svg viewBox="0 0 200 200" width="100%">{sl.map((s,i)=><path key={i} d={s.d} fill={s.color} stroke="#fff" strokeWidth={2}/>)}<circle cx={cx} cy={cy} r={ir} fill="white"/></svg>;
}

function LDonut({segments}){
  const cx=100,cy=100,r=90,ir=56,ER=r+12,HL=18,MG=28;
  const total=segments.reduce((s,x)=>s+x.value,0);
  if(!total)return<svg viewBox="-100 -25 400 250" width="100%"><circle cx={cx} cy={cy} r={r} fill="#f0f2f8"/><circle cx={cx} cy={cy} r={ir} fill="white"/></svg>;
  let a=-Math.PI/2;
  const sl=segments.filter(s=>s.value>0).map(s=>{
    const pct=s.value/total*100,sw=Math.min(pct/100*2*Math.PI,2*Math.PI-0.0001),sa=a,ea=a+sw,mid=(sa+ea)/2,lg=sw>Math.PI?1:0;
    const[c1,s1,c2,s2]=[Math.cos(sa),Math.sin(sa),Math.cos(ea),Math.sin(ea)];
    const d=`M${cx+r*c1} ${cy+r*s1} A${r} ${r} 0 ${lg} 1 ${cx+r*c2} ${cy+r*s2} L${cx+ir*c2} ${cy+ir*s2} A${ir} ${ir} 0 ${lg} 0 ${cx+ir*c1} ${cy+ir*s1}Z`;
    a=ea;const cos=Math.cos(mid),sin=Math.sin(mid);
    return{...s,d,pct,cos,sin,isRight:cos>=0};
  });
  const sY=g=>{const so=[...g].sort((a,b)=>a.sin-b.sin),out=[];for(let i=0;i<so.length;i++){const nat=cy+ER*so[i].sin,fy=i===0?nat:Math.max(nat,out[i-1].f+MG);out.push({...so[i],f:fy});}return out;};
  const pos=[...sY(sl.filter(s=>s.isRight)),...sY(sl.filter(s=>!s.isRight))];
  return<svg viewBox="-100 -25 400 250" width="100%">
    {sl.map((s,i)=><path key={i} d={s.d} fill={s.color} stroke="#fff" strokeWidth={2}/>)}
    <circle cx={cx} cy={cy} r={ir} fill="white"/>
    {pos.map((s,i)=>{const x1=cx+r*s.cos,y1=cy+r*s.sin,x2=cx+ER*s.cos,y2=s.f,x3=x2+(s.isRight?HL:-HL),tx=x3+(s.isRight?3:-3),anc=s.isRight?"start":"end";
      return<g key={i}><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={s.color} strokeWidth={1}/><line x1={x2} y1={y2} x2={x3} y2={y2} stroke={s.color} strokeWidth={1}/><circle cx={x1} cy={y1} r={2} fill={s.color}/><text x={tx} y={y2-5} fontSize={13} fontWeight="700" fill={s.color} textAnchor={anc}>{s.label}</text><text x={tx} y={y2+11} fontSize={13} fill="#555" textAnchor={anc}>{s.pct.toFixed(1)}%</text></g>;
    })}
  </svg>;
}

function ML({items,total}){return items.map((it,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}><div style={{width:7,height:7,borderRadius:1,background:it.color,flexShrink:0}}/><span style={{fontSize:10,color:"#555",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.label}</span><span style={{marginLeft:"auto",fontSize:10,color:"#888",whiteSpace:"nowrap"}}>{total>0?(it.value/total*100).toFixed(1)+"%":"0%"}</span></div>);}

function Calc(){
  const[e,setE]=useState(""); const[r,setR]=useState(null); const[er,setEr]=useState(false);
  const go=()=>{if(!e.trim())return;try{const c=e.replace(/,/g,"").replace(/[^0-9+\-*/().%\s]/g,""),v=Function('"use strict";return('+c+')')();if(typeof v!=="number"||!isFinite(v)){setEr(true);setR("오류");return;}setEr(false);setR(Math.round(v*10000)/10000);}catch{setEr(true);setR("오류");}};
  return<div style={{minWidth:0}}><div style={{display:"flex",gap:3}}><input value={e} onChange={x=>{setE(x.target.value);setR(null);}} onKeyDown={x=>x.key==="Enter"&&go()} placeholder="예: 100+200" style={{flex:1,minWidth:0,width:0,fontSize:11,padding:"5px 6px",border:"1px solid #dde1ec",borderRadius:6,outline:"none",background:"#f7f8fc"}}/><button onClick={go} style={{flexShrink:0,background:"#1a1a2e",color:"#fff",border:"none",borderRadius:6,padding:"5px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>=</button></div>{r!==null&&<div style={{marginTop:5,padding:"4px 8px",borderRadius:6,background:er?"#fff0f0":"#f0f7ff",fontSize:13,fontWeight:700,color:er?"#c92a2a":"#1a1a2e",textAlign:"right"}}>{er?r:Number(r).toLocaleString()}</div>}<div style={{marginTop:4,fontSize:8,color:"#ccc"}}>+ − * / ( ) · Enter</div></div>;
}

function App(){
  const[data,setData]=useState({accounts:[],activeId:null});
  const[showAcc,setShowAcc]=useState(false);
  const[newAcc,setNewAcc]=useState("");
  const[form,setForm]=useState({name:"",amount:"",category:"cyclical"});
  const[editId,setEditId]=useState(null);
  const[editF,setEditF]=useState({});
  const[tab,setTab]=useState("all");
  const[err,setErr]=useState("");
  const[renId,setRenId]=useState(null);
  const[renV,setRenV]=useState("");
  const[confDel,setConfDel]=useState(null);
  const[di,setDi]=useState(null);
  const[doi,setDoi]=useState(null);
  const[adi,setAdi]=useState(null);
  const[adoi,setAdoi]=useState(null);
  const nr=useRef(null);

  const P=next=>setData(next);
  const isComb=data.activeId===COMBINED;
  const aa=data.accounts.find(a=>a.id===data.activeId)||null;
  const stocks=aa?aa.stocks:[];
  const total=stocks.reduce((s,x)=>s+x.amount,0);
  const disp=tab==="all"?stocks:stocks.filter(x=>x.category===tab);

  const cm={};
  data.accounts.forEach(acc=>acc.stocks.forEach(s=>{const k=s.name.trim().toLowerCase();if(!cm[k])cm[k]={id:k,name:s.name,amount:0,category:s.category,sources:[]};cm[k].amount+=s.amount;cm[k].sources.push({accName:acc.name,amount:s.amount});}));
  const cStocks=Object.values(cm).sort((a,b)=>CAT_ORDER[a.category]!==CAT_ORDER[b.category]?CAT_ORDER[a.category]-CAT_ORDER[b.category]:b.amount-a.amount);
  const cTotal=cStocks.reduce((s,x)=>s+x.amount,0);
  const cDisp=tab==="all"?cStocks:cStocks.filter(x=>x.category===tab);

  const T=isComb
    ?{total:cTotal,cash:sumCat(cStocks,"cash"),ce:sumCat(cStocks,"cash_eq"),cyc:sumCat(cStocks,"cyclical"),def:sumCat(cStocks,"defensive"),oth:sumCat(cStocks,"other")}
    :{total,cash:sumCat(stocks,"cash"),ce:sumCat(stocks,"cash_eq"),cyc:sumCat(stocks,"cyclical"),def:sumCat(stocks,"defensive"),oth:sumCat(stocks,"other")};
  const inv=T.total-T.cash;
  const r2=[{key:"cash_eq",val:T.ce},{key:"cyclical",val:T.cyc},{key:"defensive",val:T.def},{key:"other",val:T.oth}].map(s=>({...s,pct:inv>0?s.val/inv*100:0}));

  const upS=fn=>P({...data,accounts:data.accounts.map(a=>a.id===data.activeId?{...a,stocks:fn(a.stocks)}:a)});
  const addAcc=()=>{if(!newAcc.trim())return;const id=Date.now();P({accounts:[...data.accounts,{id,name:newAcc.trim(),stocks:[]}],activeId:id});setNewAcc("");setShowAcc(false);setTab("all");};
  const delAcc=id=>{const n=data.accounts.filter(a=>a.id!==id);P({accounts:n,activeId:n.length?(data.activeId===id?n[0].id:data.activeId):null});setConfDel(null);};
  const sw=id=>{P({...data,activeId:id});setEditId(null);setTab("all");};
  const addS=()=>{if(!form.name.trim()){setErr("종목명을 입력하세요.");return;}const a=parseFloat(form.amount);if(!form.amount||isNaN(a)||a<=0){setErr("금액을 입력하세요.");return;}setErr("");upS(ss=>[...ss,{id:Date.now(),name:form.name.trim(),amount:a,category:form.category}]);setForm(f=>({name:"",amount:"",category:f.category}));setTimeout(()=>nr.current&&nr.current.focus(),0);};
  const delS=id=>upS(ss=>ss.filter(x=>x.id!==id));
  const stE=s=>{setEditId(s.id);setEditF({name:s.name,amount:String(s.amount),category:s.category});};
  const svE=()=>{const a=parseFloat(editF.amount);if(!editF.name.trim()||isNaN(a)||a<=0)return;upS(ss=>ss.map(x=>x.id===editId?{...x,name:editF.name.trim(),amount:a,category:editF.category}:x));setEditId(null);};
  const svR=()=>{if(!renV.trim())return;P({...data,accounts:data.accounts.map(a=>a.id===renId?{...a,name:renV.trim()}:a)});setRenId(null);};
  const ds=(e,i)=>{setDi(i);e.currentTarget.style.opacity="0.4";};
  const de=e=>{e.currentTarget.style.opacity="1";setDi(null);setDoi(null);};
  const dov=(e,i)=>{e.preventDefault();if(di!==null&&di!==i)setDoi(i);};
  const dp=(e,i)=>{e.preventDefault();if(di===null||di===i)return;upS(ss=>{const arr=[...ss],fi=arr.findIndex(x=>x.id===disp[di].id),ti=arr.findIndex(x=>x.id===disp[i].id);const[m]=arr.splice(fi,1);arr.splice(ti,0,m);return arr;});setDi(null);setDoi(null);};
  const ads=(e,i)=>{setAdi(i);e.currentTarget.style.opacity="0.4";};
  const ade=e=>{e.currentTarget.style.opacity="1";setAdi(null);setAdoi(null);};
  const adov=(e,i)=>{e.preventDefault();if(adi!==null&&adi!==i)setAdoi(i);};
  const adp=(e,i)=>{e.preventDefault();if(adi===null||adi===i)return;const arr=[...data.accounts];const[m]=arr.splice(adi,1);arr.splice(i,0,m);P({...data,accounts:arr});setAdi(null);setAdoi(null);};

  const half=Math.ceil(data.accounts.length/2);
  const r1=data.accounts.slice(0,half),r2a=data.accounts.slice(half);

  const Chip=({a,idx})=>{const ac=getAC(a.name),isA=a.id===data.activeId;
    return<div draggable onDragStart={e=>ads(e,idx)} onDragEnd={ade} onDragOver={e=>adov(e,idx)} onDrop={e=>adp(e,idx)} onClick={()=>sw(a.id)}
      style={{display:"inline-flex",alignItems:"center",gap:2,cursor:"pointer",borderRadius:14,padding:"3px 6px 3px 8px",background:isA?ac.active:ac.light,border:"1px solid "+(isA?ac.active:ac.border),opacity:adoi===idx?0.5:1,flexShrink:0}}>
      <div style={{width:5,height:5,borderRadius:"50%",background:ac.dot,marginRight:1,flexShrink:0}}/>
      {renId===a.id?<input autoFocus value={renV} onChange={e=>setRenV(e.target.value)} onClick={e=>e.stopPropagation()} onKeyDown={e=>{if(e.key==="Enter")svR();if(e.key==="Escape")setRenId(null);}} style={{fontSize:10,width:60,border:"none",outline:"none",background:"transparent",fontWeight:600,color:isA?"#fff":"#333"}}/>
      :<span style={{fontSize:10,fontWeight:600,color:isA?"#fff":"#333",whiteSpace:"nowrap"}}>{a.name}</span>}
      <button onClick={e=>{e.stopPropagation();setRenId(a.id);setRenV(a.name);}} style={{...gb,fontSize:9,padding:0}}>✏️</button>
      <button onClick={e=>{e.stopPropagation();setConfDel(a.id);}} style={{...gb,fontSize:9,padding:0}}>✕</button>
    </div>;
  };

  const SC=()=><div style={{background:"#fff",border:"1px solid #e0e4ef",borderRadius:10,padding:"8px 10px",display:"flex",flexDirection:"column",justifyContent:"space-around"}}>
    {[{l:"보유현금",v:T.cash,c:catColor.cash},{l:"총투자금액",v:inv,c:"#e05c5c"},{l:"현금성자산",v:T.ce,c:catColor.cash_eq},{l:"총 보유금액",v:T.total,c:"#1a1a2e",b:true}].map((it,i)=>
      <div key={i} style={{borderBottom:i<3?"1px solid #f0f2f8":"none",padding:"2px 0 4px 0"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:1}}>{it.l}</div>
        <div style={{fontSize:it.b?14:13,fontWeight:700,color:it.c}}>{fmt(it.v)}</div>
      </div>
    )}
  </div>;

  const SR=({s,pct,isLast,isCR})=>{
    const isE=!isCR&&editId===s.id;
    const cols=isCR?"16px 1fr 110px":"16px 1fr 100px 60px";
    return<div draggable={!isCR&&!isE} onDragStart={!isCR?e=>ds(e,s._i):undefined} onDragEnd={!isCR?de:undefined} onDragOver={!isCR?e=>dov(e,s._i):undefined} onDrop={!isCR?e=>dp(e,s._i):undefined} style={{borderBottom:isLast?"none":"1px solid #f0f2f8",borderTop:!isCR&&doi===s._i?"2px solid #4f8ef7":"none"}}>
      {isE?<div style={{padding:"10px 14px",background:"#fafbff",display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:16,color:"#ccc"}}>⠿</span>
        <input value={editF.name} onChange={e=>setEditF({...editF,name:e.target.value})} style={{flex:"1 1 90px",padding:"5px 8px",fontSize:12,border:"1px solid #b8d0f7",borderRadius:6,outline:"none"}}/>
        <input type="number" value={editF.amount} onChange={e=>setEditF({...editF,amount:e.target.value})} style={{flex:"1 1 80px",padding:"5px 8px",fontSize:12,border:"1px solid #b8d0f7",borderRadius:6,outline:"none"}}/>
        {CATS.map(c=><button key={c} onClick={()=>setEditF({...editF,category:c})} style={{fontSize:10,fontWeight:600,padding:"5px 8px",borderRadius:6,cursor:"pointer",border:"1px solid "+(editF.category===c?catColor[c]:"#dde1ec"),background:editF.category===c?catColor[c]:"#f7f8fc",color:editF.category===c?"#fff":"#666"}}>{catShort[c]}</button>)}
        <button onClick={svE} style={smBtn("#1a1a2e","#fff")}>저장</button>
        <button onClick={()=>setEditId(null)} style={smBtn("#eee","#555")}>취소</button>
      </div>
      :<div style={{display:"grid",gridTemplateColumns:cols,alignItems:"center",padding:"7px 14px",cursor:isCR?"default":"grab"}}>
        <span style={{fontSize:16,color:"#ccc",userSelect:"none"}}>{isCR?"":"⠿"}</span>
        <div style={{minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={tagSt(s.category)}>{catLabel[s.category]}</span>
            <span style={{fontSize:13,fontWeight:600,color:"#1a1a2e",whiteSpace:"nowrap",width:"8ch",minWidth:"8ch",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</span>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",width:46,flexShrink:0}}>
              <span style={{fontSize:8,color:"#bbb",lineHeight:1}}>비중</span>
              <span style={{fontSize:11,fontWeight:700,color:catColor[s.category],lineHeight:1.4}}>{pct.toFixed(1)}%</span>
            </div>
            <div style={{flex:1,height:10,background:"#f0f2f8",borderRadius:5,minWidth:20}}>
              <div style={{width:pct+"%",height:"100%",background:catColor[s.category],borderRadius:5,transition:"width 0.3s"}}/>
            </div>
          </div>
          {isCR&&s.sources&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:3}}>{s.sources.map((src,i)=><span key={i} style={{fontSize:10,color:"#888",background:"#f0f2f8",borderRadius:10,padding:"1px 7px"}}>{src.accName}: {fmt(src.amount)}</span>)}</div>}
        </div>
        <span style={{textAlign:"right",fontSize:12,fontWeight:700,color:catColor[s.category]}}>{fmt(s.amount)}</span>
        {!isCR&&<div style={{display:"flex",justifyContent:"center",gap:4}}><button onClick={()=>stE(s)} style={ib}>✏️</button><button onClick={()=>delS(s.id)} style={ib}>🗑️</button></div>}
      </div>}
    </div>;
  };

  return<div style={{fontFamily:"'Segoe UI',sans-serif",maxWidth:760,margin:"0 auto",padding:"18px 14px",background:"#f7f8fc",minHeight:"100vh"}}>
    <h1 style={{fontSize:20,fontWeight:700,color:"#1a1a2e",marginBottom:10}}>📊 주식 포트폴리오</h1>

    <div style={{display:"flex",alignItems:"stretch",marginBottom:6,background:"#fff",border:"1px solid #e0e4ef",borderRadius:12,padding:"8px 10px"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",gap:5,marginBottom:r2a.length||showAcc?5:0,flexWrap:"nowrap",overflowX:"auto"}}>
          {r1.map((a,i)=><Chip key={a.id} a={a} idx={i}/>)}
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"nowrap",overflowX:"auto",alignItems:"center"}}>
          {r2a.map((a,i)=><Chip key={a.id} a={a} idx={half+i}/>)}
          {showAcc?<div style={{display:"flex",gap:4,flexShrink:0}}>
            <input autoFocus placeholder="계좌명" value={newAcc} onChange={e=>setNewAcc(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addAcc();if(e.key==="Escape")setShowAcc(false);}} style={{fontSize:11,padding:"4px 8px",border:"1px solid #dde1ec",borderRadius:20,outline:"none",width:80}}/>
            <button onClick={addAcc} style={{...smBtn("#1a1a2e","#fff"),padding:"3px 8px",fontSize:11}}>추가</button>
            <button onClick={()=>setShowAcc(false)} style={{...smBtn("#eee","#555"),padding:"3px 8px",fontSize:11}}>취소</button>
          </div>:<button onClick={()=>setShowAcc(true)} style={{fontSize:11,fontWeight:600,padding:"4px 10px",borderRadius:20,border:"1px solid #dde1ec",background:"#eef",color:"#1a1a2e",cursor:"pointer",flexShrink:0}}>+ 계좌 추가</button>}
        </div>
      </div>
      {data.accounts.length>=2&&<><div style={{width:1,background:"#e0e4ef",margin:"0 10px",flexShrink:0}}/><div style={{display:"flex",alignItems:"center",flexShrink:0}}><button onClick={()=>sw(COMBINED)} style={{fontSize:11,fontWeight:600,padding:"4px 12px",borderRadius:20,cursor:"pointer",whiteSpace:"nowrap",border:"1px solid "+(isComb?"#6c47d4":"#dde1ec"),background:isComb?"#6c47d4":"#fff",color:isComb?"#fff":"#555"}}>🔀 통합</button></div></>}
    </div>

    {confDel&&(()=>{const a=data.accounts.find(x=>x.id===confDel);return a?<div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",background:"#fff3f3",border:"1px solid #f7c9c9",borderRadius:8,marginBottom:8,fontSize:12}}><span style={{color:"#c92a2a",fontWeight:600}}>"{a.name}" 삭제하시겠습니까?</span><button onClick={()=>delAcc(confDel)} style={{...smBtn("#c92a2a","#fff"),padding:"3px 10px",fontSize:11}}>삭제</button><button onClick={()=>setConfDel(null)} style={{...smBtn("#eee","#555"),padding:"3px 10px",fontSize:11}}>취소</button></div>:null;})()}

    {!data.activeId?<div style={{textAlign:"center",color:"#aaa",fontSize:14,padding:"60px 0"}}>위에서 계좌를 추가해주세요.</div>:<>
      {!isComb&&<input placeholder="메모..." value={aa?.memo||""} onChange={e=>P({...data,accounts:data.accounts.map(a=>a.id===data.activeId?{...a,memo:e.target.value}:a)})} style={{width:"100%",fontSize:13,fontWeight:600,color:"#333",border:"none",borderBottom:"1px solid #dde1ec",background:"transparent",outline:"none",padding:"2px 4px",marginBottom:10}}/>}

      {isComb?<div style={{display:"grid",gridTemplateColumns:"0.4fr 1fr 1fr",gap:8,marginBottom:10}}>
        <SC/>
        <div style={{background:"#fff",border:"1px solid #e0e4ef",borderRadius:10,padding:"6px 8px"}}><div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:2}}>전체 비중</div><LDonut segments={CATS.map(c=>({label:catLabel[c],value:sumCat(cStocks,c),color:catColor[c]})).filter(x=>x.value>0)}/></div>
        <div style={{background:"#fff",border:"1px solid #e0e4ef",borderRadius:10,padding:"6px 8px"}}><div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:2}}>주식 비중</div><LDonut segments={["cash_eq","cyclical","defensive","other"].map(c=>({label:catLabel[c],value:sumCat(cStocks,c),color:catColor[c]})).filter(x=>x.value>0)}/></div>
      </div>
      :<div style={{display:"grid",gridTemplateColumns:"minmax(90px,0.2fr) 1fr 1fr 0.9fr",gap:10,marginBottom:14}}>
        <SC/>
        <div style={{background:"#fff",border:"1px solid #e0e4ef",borderRadius:10,padding:"10px 12px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:6}}>자산 비중</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{width:80,flexShrink:0}}><Donut segments={[{value:T.cash,color:catColor.cash},{value:T.cyc+T.def+T.oth,color:"#e05c5c"},{value:T.ce,color:catColor.cash_eq}]}/></div>
            <div style={{flex:1,minWidth:0}}><ML items={[{label:"현금",value:T.cash,color:catColor.cash},{label:"총투자금액",value:T.cyc+T.def+T.oth,color:"#e05c5c"},{label:"현금성자산",value:T.ce,color:catColor.cash_eq}]} total={T.total}/></div>
          </div>
        </div>
        <div style={{background:"#fff",border:"1px solid #e0e4ef",borderRadius:10,padding:"10px 12px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:6}}>주식 비중</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{width:80,flexShrink:0}}><Donut segments={r2.filter(s=>s.val>0).map(s=>({value:s.val,color:catColor[s.key]}))}/></div>
            <div style={{flex:1,minWidth:0}}><ML items={r2.filter(s=>s.val>0).map(s=>({label:catLabel[s.key],value:s.val,color:catColor[s.key]}))} total={inv}/></div>
          </div>
        </div>
        <div style={{background:"#fff",border:"1px solid #e0e4ef",borderRadius:10,padding:"10px 12px",display:"flex",flexDirection:"column",justifyContent:"flex-start",minWidth:0,overflow:"hidden"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:6}}>계산기</div>
          <Calc/>
        </div>
      </div>}

      {!isComb&&<div style={{background:"#fff",border:"1px solid #e0e4ef",borderRadius:12,padding:14,marginBottom:14}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <input ref={nr} placeholder="종목명" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addS()} style={{flex:"1 1 100px",padding:"7px 10px",fontSize:12,border:"1px solid #dde1ec",borderRadius:8,outline:"none",background:"#f7f8fc"}}/>
          <input placeholder="금액 ($)" type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addS()} style={{flex:"1 1 90px",padding:"7px 10px",fontSize:12,border:"1px solid #dde1ec",borderRadius:8,outline:"none",background:"#f7f8fc"}}/>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{CATS.map(c=><button key={c} onClick={()=>setForm({...form,category:c})} style={{fontSize:11,fontWeight:600,padding:"6px 10px",borderRadius:7,cursor:"pointer",border:"1px solid "+(form.category===c?catColor[c]:"#dde1ec"),background:form.category===c?catColor[c]:"#f7f8fc",color:form.category===c?"#fff":"#666"}}>{catShort[c]}</button>)}</div>
          <button onClick={addS} style={{...smBtn("#1a1a2e","#fff"),padding:"7px 16px",fontSize:12}}>추가</button>
        </div>
        {err&&<div style={{fontSize:11,color:"#e05252",marginTop:6}}>{err}</div>}
      </div>}

      <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
        {[["all","전체"],...CATS.map(c=>[c,catLabel[c]])].map(([v,l])=><button key={v} onClick={()=>setTab(v)} style={{fontSize:11,fontWeight:600,padding:"5px 12px",borderRadius:20,cursor:"pointer",border:"1px solid #dde1ec",background:tab===v?"#1a1a2e":"#fff",color:tab===v?"#fff":"#555"}}>{l}</button>)}
        {!isComb&&<span style={{marginLeft:"auto",fontSize:11,color:"#bbb",alignSelf:"center"}}>⠿ 드래그로 순서 변경</span>}
        {isComb&&<span style={{marginLeft:"auto",fontSize:11,color:"#888",alignSelf:"center"}}>모든 계좌 합산 · 읽기 전용</span>}
      </div>

      <div style={{background:"#fff",border:"1px solid #e0e4ef",borderRadius:12,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:isComb?"16px 1fr 110px":"16px 1fr 100px 60px",padding:"7px 14px",background:"#f0f2f8",fontSize:10,fontWeight:700,color:"#888",borderBottom:"1px solid #e8eaf2"}}>
          <span/><span>종목</span><span style={{textAlign:"right"}}>금액</span>{!isComb&&<span style={{textAlign:"center"}}>관리</span>}
        </div>
        {isComb&&(cDisp.length===0?<div style={{textAlign:"center",color:"#bbb",fontSize:13,padding:"30px 0"}}>종목이 없습니다.</div>:cDisp.map((s,i)=><SR key={s.id} s={s} pct={cTotal>0?s.amount/cTotal*100:0} isLast={i===cDisp.length-1} isCR={true}/>))}
        {!isComb&&(disp.length===0?<div style={{textAlign:"center",color:"#bbb",fontSize:13,padding:"30px 0"}}>종목이 없습니다.</div>:disp.map((s,i)=><SR key={s.id} s={{...s,_i:i}} pct={total>0?s.amount/total*100:0} isLast={i===disp.length-1} isCR={false}/>))}
        {(()=>{const rows=isComb?cDisp:disp,rt=rows.reduce((s,x)=>s+x.amount,0),g=isComb?cTotal:total;return rows.length>0&&<div style={{display:"grid",gridTemplateColumns:isComb?"16px 1fr 110px":"16px 1fr 100px 60px",alignItems:"center",padding:"8px 14px",background:"#f0f2f8",borderTop:"2px solid #e0e4ef"}}><span/><span style={{fontSize:11,fontWeight:700,color:"#555"}}>합계 ({rows.length}종목)</span><span style={{textAlign:"right",fontSize:12,fontWeight:700,color:"#1a1a2e"}}>{fmt(rt)}</span>{!isComb&&<span/>}</div>;})()}
      </div>
    </>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
